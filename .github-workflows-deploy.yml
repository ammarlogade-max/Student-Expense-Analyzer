# ── ExpenseIQ — GitHub Actions CI/CD (FREE TIER) ─────────────────────────────
# Save as: .github/workflows/deploy.yml  (in your repo root)
#
# Runs on every push to main:
#   1. Type-checks backend (tsc)
#   2. Builds frontend (vite build)
#   3. Syntax-checks ML service
#   4. If all pass → triggers Render redeploys via API
#   Vercel redeploys automatically via its own GitHub integration (no action needed)
#
# Required GitHub Secrets (repo Settings → Secrets → Actions):
#   RENDER_API_KEY          → Render dashboard → Account Settings → API Keys
#   RENDER_BACKEND_SVC_ID   → Render → backend service → Settings → Service ID (srv-xxx)
#   RENDER_ML_SVC_ID        → Render → ML service → Settings → Service ID

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend type-check ────────────────────────────────────────────────────
  check-backend:
    name: Backend — TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript compile
        run: npm run build
        # build = tsc -p tsconfig.production.json
        # Any type error fails the pipeline and blocks deploy

  # ── Frontend build ────────────────────────────────────────────────────────
  check-frontend:
    name: Frontend — Vite Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Dummy Firebase values so Vite doesn't crash on missing vars
      VITE_API_URL: https://expenseiq-backend.onrender.com/api
      VITE_FIREBASE_API_KEY: dummy-key
      VITE_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: dummy-project
      VITE_FIREBASE_STORAGE_BUCKET: dummy.appspot.com
      VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      VITE_FIREBASE_APP_ID: 1:000:web:000
      VITE_FIREBASE_VAPID_KEY: dummy-vapid-key
      VITE_ENABLE_SW: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # tsc + vite build — catches type errors AND build failures

  # ── ML service syntax check ───────────────────────────────────────────────
  check-ml:
    name: ML Service — Python Syntax
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml_service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile main.py utils.py

  # ── Deploy to Render ───────────────────────────────────────────────────────
  # Only runs on push to main (not on PRs) and only if all checks pass
  deploy:
    name: Deploy → Render
    needs: [check-backend, check-frontend, check-ml]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger backend redeploy
        run: |
          echo "Triggering backend redeploy..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SVC_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Response code: $HTTP_CODE"
          if [ "$HTTP_CODE" != "201" ]; then
            echo "Backend deploy trigger failed"
            exit 1
          fi
          echo "✅ Backend redeploy triggered"

      - name: Trigger ML service redeploy
        run: |
          echo "Triggering ML service redeploy..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_ML_SVC_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Response code: $HTTP_CODE"
          if [ "$HTTP_CODE" != "201" ]; then
            echo "ML deploy trigger failed"
            exit 1
          fi
          echo "✅ ML service redeploy triggered"

      - name: Done
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Deploys triggered on Render"
          echo "  Monitor at: https://dashboard.render.com"
          echo "  Backend:  https://expenseiq-backend.onrender.com/api/health"
          echo "  ML:       https://expenseiq-ml.onrender.com/health"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # Note: Vercel deploys automatically when it detects changes in frontend/
  # No action needed — Vercel's GitHub App handles it on its own.
