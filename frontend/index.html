<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary meta ──────────────────────────────────────────── -->
    <title>ExpenseIQ — AI Finance for Students</title>
    <meta name="description" content="AI-powered expense tracking, budget management, and behavioral finance scoring built for Indian students." />
    <meta name="keywords"    content="expense tracker, student finance, budget, UPI, SMS parser, India" />
    <meta name="author"      content="Ammar" />

    <!-- ── PWA ───────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── iOS PWA ───────────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable"          content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title"            content="ExpenseIQ" />
    <link rel="apple-touch-icon"              href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />

    <!-- iOS splash screens (portrait, common devices) -->
    <!-- iPhone 14 Pro Max -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
      href="/icons/splash-1290x2796.png" />
    <!-- iPhone 14 / 13 / 12 -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
      href="/icons/splash-1170x2532.png" />
    <!-- iPhone SE -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)"
      href="/icons/splash-750x1334.png" />

    <!-- ── Favicon ────────────────────────────────────────────────── -->
    <link rel="icon"      type="image/png" sizes="32x32" href="/icons/icon-96.png" />
    <link rel="icon"      type="image/png" sizes="16x16" href="/icons/icon-72.png" />
    <link rel="shortcut icon" href="/icons/icon-192.png" />

    <!-- ── Open Graph (share previews) ──────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="ExpenseIQ — AI Finance for Students" />
    <meta property="og:description" content="Track expenses, parse bank SMS, and earn your Finance Score." />
    <meta property="og:image"       content="/icons/icon-512.png" />
    <meta property="og:url"         content="https://expenseiq.app" />

    <!-- ── Twitter Card ──────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="ExpenseIQ" />
    <meta name="twitter:description" content="AI-powered student finance tracker" />
    <meta name="twitter:image"       content="/icons/icon-512.png" />

    <!-- ── Fonts (preconnect for speed) ─────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
